- defaults:
    link:
      relink: true

# Remove dead links pointing to dotbot
- clean:
    - '~'

# Create symlinks
- link:
    ~/.bin.base: bin
    ~/.ideavimrc: vim/ideavimrc
    ~/.multitailrc: multitail/multitailrc
    ~/.ssh/config:
      path: ssh/config
      create: true
    ~/.vimrc: vim/vimrc
    ~/.zsh/includes:
      path: zsh/includes
      create: true
    ~/.zlogin: zsh/40-zlogin.sh
    ~/.zlogout: zsh/50-zlogout.sh
    ~/.zprofile:
      path: zsh/20-zprofile.sh
      force: true
    ~/.zshenv: zsh/10-zshenv.sh
    ~/.zshrc: zsh/30-zshrc.sh
    ~/.zsh_plugins.txt: zsh/zsh_plugins.txt
    /tmp/init: init
    ~/.config/atuin/config.toml:
      path: atuin/config.toml
      create: true
    ~/Library/LaunchAgents/com.atuin.daemon.plist: atuin/com.atuin.daemon.plist

- shell:
    - command: /bin/bash /tmp/init/install.sh
      description: Install script
      stdout: true
      stderr: true
      stdin: true
    - command: |
        if command -v atuin >/dev/null 2>&1 && [ -f ~/Library/LaunchAgents/com.atuin.daemon.plist ]; then
          launchctl bootout gui/$(id -u) ~/Library/LaunchAgents/com.atuin.daemon.plist 2>/dev/null || true
          launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.atuin.daemon.plist
        fi
      description: Load atuin daemon LaunchAgent
