# Atuin base configuration (tier 1 - sensible defaults)
# Override with tier 3 (~/.config/atuin symlink) for personal preferences
#
# NOTE: db_path volontairement omis — le default atuin
# (~/.local/share/atuin/history.db) est conservé pour éviter de créer
# une DB vide si un utilisateur avait déjà un historique au chemin par défaut.
# Tier 3 peut redéfinir db_path si besoin.

[keys]
# Disable up/down in TUI to avoid conflicts with zsh-vi-mode
up = "none"
down = "none"

[daemon]
# Le daemon assure la sync en arrière-plan ET l'index en mémoire du mode de
# recherche "daemon-fuzzy". C'est daemon-fuzzy — pas le daemon seul — qui élimine
# la latence cold-start du Ctrl+R. Le mode est activé via ATUIN_SEARCH_MODE selon
# la version d'atuin installée (cf. ~/.zshrc), pas ici (incompatible < 18.13).
enabled = true
sync_frequency = 300

[sync]
# Enable sync v2
records = true
